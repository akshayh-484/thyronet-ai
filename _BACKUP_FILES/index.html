<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thyroid Cancer Risk Prediction System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
            border: none;
            background: none;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            color: #667eea;
            background: white;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 40px;
        }

        .tab-content.active {
            display: block;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .upload-area:hover {
            background: #e9ecef;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e9ecef;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.benign {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .result.malignant {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .result h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .confidence {
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .probability-bars {
            margin-top: 20px;
        }

        .prob-item {
            margin-bottom: 15px;
        }

        .prob-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .prob-bar {
            height: 30px;
            background: rgba(255,255,255,0.3);
            border-radius: 15px;
            overflow: hidden;
        }

        .prob-fill {
            height: 100%;
            background: white;
            border-radius: 15px;
            transition: width 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .preview-image {
            max-width: 300px;
            max-height: 300px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .model-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Thyroid Cancer Risk Prediction</h1>
            <p>Advanced AI-Powered Diagnostic System</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('image')">📸 Upload Image</button>
            <button class="tab" onclick="switchTab('numerical')">📊 Enter Features</button>
        </div>

        <!-- Image Upload Tab -->
        <div id="image-tab" class="tab-content active">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                <div class="upload-icon">📤</div>
                <h3>Click or Drag Image Here</h3>
                <p>Supported formats: PNG, JPG, JPEG, BMP, TIFF</p>
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            </div>
            <img id="previewImage" class="preview-image" style="display: none;">
            <button class="btn" id="predictImageBtn" onclick="predictImage()" disabled>Analyze Image</button>
            <div class="loading" id="imageLoading">
                <div class="spinner"></div>
                <p>Analyzing image...</p>
            </div>
            <div class="error" id="imageError"></div>
            <div class="result" id="imageResult"></div>
        </div>

        <!-- Numerical Features Tab -->
        <div id="numerical-tab" class="tab-content">
            <form id="numericalForm" onsubmit="predictNumerical(event)">
                <div class="form-grid" id="featureInputs"></div>
                <button type="submit" class="btn">Predict Risk</button>
            </form>
            <div class="loading" id="numericalLoading">
                <div class="spinner"></div>
                <p>Processing data...</p>
            </div>
            <div class="error" id="numericalError"></div>
            <div class="result" id="numericalResult"></div>
        </div>
    </div>

    <script>
        let selectedImage = null;

        // Switch between tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'image') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('image-tab').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('numerical-tab').classList.add('active');
            }
        }

        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageFile(file);
            }
        });

        // Handle image upload
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                handleImageFile(file);
            }
        }

        function handleImageFile(file) {
            selectedImage = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('previewImage');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('predictImageBtn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // Predict from image
        async function predictImage() {
            if (!selectedImage) return;

            const formData = new FormData();
            formData.append('image', selectedImage);

            document.getElementById('imageLoading').style.display = 'block';
            document.getElementById('imageResult').style.display = 'none';
            document.getElementById('imageError').style.display = 'none';

            try {
                const response = await fetch('/predict-image', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    displayResult('imageResult', data);
                } else {
                    showError('imageError', data.error);
                }
            } catch (error) {
                showError('imageError', 'Network error. Please try again.');
            } finally {
                document.getElementById('imageLoading').style.display = 'none';
            }
        }

        // Load feature inputs
        fetch('/get-features')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const container = document.getElementById('featureInputs');
                    data.features.forEach(feature => {
                        const div = document.createElement('div');
                        div.className = 'form-group';
                        div.innerHTML = `
                            <label>${feature.replace(/_/g, ' ')}</label>
                            <input type="number" step="any" name="${feature}" required>
                        `;
                        container.appendChild(div);
                    });
                }
            });

        // Predict from numerical features
        async function predictNumerical(event) {
            event.preventDefault();

            const formData = new FormData(event.target);
            const features = {};
            formData.forEach((value, key) => {
                features[key] = parseFloat(value);
            });

            document.getElementById('numericalLoading').style.display = 'block';
            document.getElementById('numericalResult').style.display = 'none';
            document.getElementById('numericalError').style.display = 'none';

            try {
                const response = await fetch('/predict-numerical', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ features })
                });

                const data = await response.json();

                if (data.success) {
                    displayResult('numericalResult', data);
                } else {
                    showError('numericalError', data.error);
                }
            } catch (error) {
                showError('numericalError', 'Network error. Please try again.');
            } finally {
                document.getElementById('numericalLoading').style.display = 'none';
            }
        }

        // Display result
        function displayResult(elementId, data) {
            const resultDiv = document.getElementById(elementId);
            const isBenign = data.prediction === 'Benign';
            
            resultDiv.className = `result ${isBenign ? 'benign' : 'malignant'}`;
            
            let html = `
                <h2>${data.prediction}</h2>
                <div class="confidence">Confidence: ${data.confidence}%</div>
                <div class="probability-bars">
                    <div class="prob-item">
                        <div class="prob-label">
                            <span>Benign</span>
                            <span>${data.probabilities.Benign}%</span>
                        </div>
                        <div class="prob-bar">
                            <div class="prob-fill" style="width: ${data.probabilities.Benign}%"></div>
                        </div>
                    </div>
                    <div class="prob-item">
                        <div class="prob-label">
                            <span>Malignant</span>
                            <span>${data.probabilities.Malignant}%</span>
                        </div>
                        <div class="prob-bar">
                            <div class="prob-fill" style="width: ${data.probabilities.Malignant}%"></div>
                        </div>
                    </div>
                </div>
            `;
            
            if (data.model_used) {
                html += `<div class="model-info">Model: ${data.model_used}</div>`;
            }
            
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
        }

        // Show error
        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
