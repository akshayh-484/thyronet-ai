services:
  - type: web
    name: thyroid-cancer-prediction
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python train_models.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FLASK_ENV
        value: production
    healthCheckPath: /
